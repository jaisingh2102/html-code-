<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Animal Kingdom - Web App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 120px;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .animals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .animal-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .animal-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-color: #667eea;
        }

        .animal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .animal-emoji {
            font-size: 3em;
        }

        .animal-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .animal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .eat-btn { background: #4ecdc4; color: white; }
        .play-btn { background: #45b7d1; color: white; }
        .sleep-btn { background: #96ceb4; color: white; }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .menu { grid-template-columns: 1fr; }
            .stats { gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 Animal Kingdom</h1>
            <p>Your Virtual Pet Zoo</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalAnimals">0</div>
                <div>Total Animals</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="dogCount">0</div>
                <div>🐕 Dogs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="catCount">0</div>
                <div>😺 Cats</div>
            </div>
        </div>

        <div class="menu">
            <button class="btn" onclick="openAddModal()">➕ Add Animal</button>
            <button class="btn" onclick="feedAll()">🍽️ Feed All</button>
            <button class="btn" onclick="playAll()">🎮 Play Time</button>
            <button class="btn" onclick="sleepAll()">😴 Bed Time</button>
        </div>

        <div class="animals-grid" id="animalsGrid">
            <!-- Animals will appear here -->
        </div>
    </div>

    <!-- Add Animal Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h2>➕ Add New Animal</h2>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="animalName" placeholder="Enter animal name">
            </div>
            <div class="form-group">
                <label>Type:</label>
                <select id="animalType">
                    <option value="dog">🐕 Dog</option>
                    <option value="cat">😺 Cat</option>
                </select>
            </div>
            <button class="btn" onclick="addAnimal()" style="width: 100%;">Add Animal 🐾</button>
        </div>
    </div>

    <script>
        // Animal "classes" (JavaScript equivalent of your Java inheritance)
        class Animal {
            constructor(name, type) {
                this.name = name;
                this.type = type;
                this.id = Date.now() + Math.random();
            }

            eat() {
                return `${this.name} eats ${this.type === 'dog' ? 'dog food 🥩' : 'cat food 🐟'}`;
            }

            sleep() {
                return `${this.name} sleeps peacefully 😴`;
            }
        }

        class Dog extends Animal {
            constructor(name) {
                super(name, 'dog');
            }

            bark() {
                return `${this.name} barks loudly! 🐕 WOOF!`;
            }
        }

        class Cat extends Animal {
            constructor(name) {
                super(name, 'cat');
            }

            meow() {
                return `${this.name} meows softly! 😺 MEOW!`;
            }
        }

        // App data
        let animals = [];

        // DOM elements
        const animalsGrid = document.getElementById('animalsGrid');
        const totalAnimalsEl = document.getElementById('totalAnimals');
        const dogCountEl = document.getElementById('dogCount');
        const catCountEl = document.getElementById('catCount');
        const addModal = document.getElementById('addModal');

        // Initialize
        updateStats();
        renderAnimals();

        // Modal functions
        function openAddModal() {
            addModal.style.display = 'block';
            document.getElementById('animalName').focus();
        }

        function closeAddModal() {
            addModal.style.display = 'none';
            document.getElementById('animalName').value = '';
        }

        // Add animal
        function addAnimal() {
            const name = document.getElementById('animalName').value.trim();
            const type = document.getElementById('animalType').value;

            if (!name) {
                alert('Please enter a name!');
                return;
            }

            const animal = type === 'dog' ? new Dog(name) : new Cat(name);
            animals.push(animal);

            closeAddModal();
            renderAnimals();
            updateStats();
            showNotification(`${animal.name} (${animal.type}) added to zoo! 🐾`);
        }

        // Render animals
        function renderAnimals() {
            animalsGrid.innerHTML = '';
            animals.forEach(animal => {
                const card = createAnimalCard(animal);
                animalsGrid.appendChild(card);
            });
        }

        function createAnimalCard(animal) {
            const card = document.createElement('div');
            card.className = 'animal-card';
            card.innerHTML = `
                <div class="animal-header">
                    <div class="animal-emoji">${animal.type === 'dog' ? '🐕' : '😺'}</div>
                    <div class="animal-name">${animal.name}</div>
                </div>
                <div class="animal-actions">
                    <button class="action-btn eat-btn" onclick="animalAction('${animal.id}', 'eat')">
                        🍽️ Feed
                    </button>
                    <button class="action-btn play-btn" onclick="animalAction('${animal.id}', 'play')">
                        🎮 Play
                    </button>
                    <button class="action-btn sleep-btn" onclick="animalAction('${animal.id}', 'sleep')">
                        😴 Sleep
                    </button>
                </div>
            `;
            return card;
        }

        // Animal actions
        function animalAction(id, action) {
            const animal = animals.find(a => a.id == id);
            if (!animal) return;

            let message;
            switch(action) {
                case 'eat':
                    message = animal.eat();
                    break;
                case 'play':
                    message = animal.type === 'dog' ? animal.bark() : animal.meow();
                    break;
                case 'sleep':
                    message = animal.sleep();
                    break;
            }
            showNotification(message);
        }

        // Bulk actions
        function feedAll() {
            if (animals.length === 0) {
                showNotification('No animals to feed! Add some first 🐾');
                return;
            }
            animals.forEach(animal => showNotification(animal.eat(), false));
        }

        function playAll() {
            if (animals.length === 0) return;
            animals.forEach(animal => {
                const action = animal.type === 'dog' ? animal.bark() : animal.meow();
                showNotification(action, false);
            });
        }

        function sleepAll() {
            if (animals.length === 0) return;
            animals.forEach(animal => showNotification(animal.sleep(), false));
        }

        // Update statistics
        function updateStats() {
            const total = animals.length;
            const dogs = animals.filter(a => a.type === 'dog').length;
            const cats = animals.filter(a => a.type === 'cat').length;

            totalAnimalsEl.textContent = total;
            dogCountEl.textContent = dogs;
            catCountEl.textContent = cats;
        }

        // Notification system
        function showNotification(message, autoClose = true) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(45deg, #4ecdc4, #44a08d);
                color: white;
                padding: 20px 30px;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                z-index: 2000;
                font-weight: bold;
                max-width: 350px;
                transform: translateX(400px);
                transition: transform 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            // Slide in
            setTimeout(() => notification.style.transform = 'translateX(0)', 100);

            // Auto remove
            if (autoClose) {
                setTimeout(() => {
                    notification.style.transform = 'translateX(400px)';
                    setTimeout(() => document.body.removeChild(notification), 300);
                }, 3000);
            }
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target === addModal) {
                closeAddModal();
            }
        }

        // Enter key to add animal
        document.getElementById('animalName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addAnimal();
        });
    </script>
</body>
</html>
